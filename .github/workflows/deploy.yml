name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build --if-present

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | sudo docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build Docker Images
        run: |
          sudo docker build \
            -t apbestpeers/express-automission:${{ github.run_number }} \
            -t apbestpeers/express-automission:latest .

      - name: Push Versioned Image
        run: |
          sudo docker push apbestpeers/express-automission:${{ github.run_number }}

      - name: Push Latest Image
        run: |
          sudo docker push apbestpeers/express-automission:latest