name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build --if-present

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      - name: Build Image
        run: |
          docker build -t apbestpeers/express-automission:latest .

      - name: Push Image
        run: |
          docker push apbestpeers/express-automission:latest

      - name: Deploy
        run: |
          ~/deploy/deploy.sh