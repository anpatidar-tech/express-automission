name: Build and Deploy

on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Docker Image
        run: |
          sudo docker build -t apbestpeers/express-automission:${{ github.run_number }} .

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | sudo docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Image
        run: |
          sudo docker push apbestpeers/express-automission:${{ github.run_number }}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: apbestpeers/express-automission:${{ github.run_number }}|g" k8s/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "update image to ${{ github.run_number }}" || echo "No changes"
          git push