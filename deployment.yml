apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app
spec:
  replicas: 4

  selector:
    matchLabels:
      app: express-app

  template:
    metadata:
      labels:
        app: express-app

    spec:
      containers:
        - name: express-app
          image: apbestpeers/express-automission:8

          ports:
            - containerPort: 3000
